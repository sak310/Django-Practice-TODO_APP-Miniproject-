{% extends 'todo/base.html' %}

{% block content %}
<h2>Task List</h2>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Completed</th>
            <th>Created</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
        {% for task in task%}
        <tr>
            <td>{{ task.title }}</td>
            <td>{{ task.description }}</td>

            <td>
                <form method="post" action="{% url 'todo:task_toggle_complete' task.pk %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm {% if task.completed %}btn-success{% else %}btn-secondary{% endif %}">
                        {% if task.completed %}Completed{% else %}Mark as Complete{% endif %}
                    </button>
                </form>
            </td>

            <td>{{ task.created_at|date:"Y-m-d H:i" }}</td>

            <td>
                <a href="{% url 'todo:task_update' task.pk %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'todo:task_delete' task.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>

        {% empty %}
        <tr>
            <td colspan="5">No tasks available.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
